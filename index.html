<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunIQ</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    
    <div class="container">

        <div class="header">
          <h1>LunIQ</h1>
          <p id="subtitle">AI powered Learning Platform</p>
          <nav class="top-nav">
            <a href="#categories-section" id="categories-link">Categories</a>
            <a href="#setup-section" id="setup-link">Setup</a>
            <a href="#quiz" id="quiz-link">Quiz</a>
          </nav>
        </div>

        <div class="auth-actions">
          <button class="auth-btn" type="button" id="show-login-btn" onclick="showAuthForm('login')">Login</button>
          <button class="auth-btn auth-btn-secondary" type="button" id="show-register-btn" onclick="showAuthForm('register')">Register</button>
        </div>

        <section class="auth-section" id="auth-section">
          <div class="auth-card" id="auth-card">
            <div class="auth-tabs">
              <button class="auth-tab active" type="button" id="tab-login" data-form="login" onclick="showAuthForm('login')">Login</button>
              <button class="auth-tab" type="button" id="tab-register" data-form="register" onclick="showAuthForm('register')">Register</button>
            </div>

            <form id="login-form" class="auth-form active" onsubmit="handleAuthSubmit(event)">
              <label id="login-email-label" for="login-email">Email</label>
              <input id="login-email" type="email" placeholder="you@example.com" required>

              <label id="login-password-label" for="login-password">Password</label>
              <input id="login-password" type="password" placeholder="••••••••" required>

              <button class="start-btn auth-submit-btn" type="submit" id="login-submit-btn">Login</button>
            </form>

            <form id="register-form" class="auth-form" onsubmit="handleAuthSubmit(event)">
              <label id="register-name-label" for="register-name">Full Name</label>
              <input id="register-name" type="text" placeholder="Your name" required>

              <label id="register-email-label" for="register-email">Email</label>
              <input id="register-email" type="email" placeholder="you@example.com" required>

              <label id="register-password-label" for="register-password">Password</label>
              <input id="register-password" type="password" placeholder="••••••••" required>

              <label id="register-confirm-label" for="register-confirm">Confirm Password</label>
              <input id="register-confirm" type="password" placeholder="Repeat password" required>

              <button class="start-btn auth-submit-btn" type="submit" id="register-submit-btn">Register</button>
            </form>

            <p class="auth-message" id="auth-message"></p>
          </div>

          <div id="auth-status" class="auth-status"></div>
        </section>

        <section class="control-panel">
          <div class="control-group">
            <label id="language-label">Language</label>
            <select id="language" onchange="changeLanguage()">
              <option value="en">English</option>
              <option value="fr">Français</option>
            </select>
          </div>
        </section>

        <section id="categories-section">
          <h2 id="category-title" class="section-title">Choose a Category</h2>

          <div class="categories">
            <div class="category-card" id="tech-card" onclick="selectCategory('Technology')">🖥️ Technology</div>
            <div class="category-card" id="health-card" onclick="selectCategory('Health')">🏥 Health & Medicine</div>
            <div class="category-card" id="engin-card" onclick="selectCategory('Engineering')">🏗️ Engineering & Architecture</div>
            <div class="category-card" id="science-card" onclick="selectCategory('Science')">🔬 Science</div>
            <div class="category-card" id="lang-card" onclick="selectCategory('Languages')">📚 Languages</div>
            <div class="category-card" id="sports-card" onclick="selectCategory('Sports')">⚽ Sports</div>
            <div class="category-card" id="business-card" onclick="selectCategory('Business')">💼 Business</div>
            <div class="category-card" id="law-card" onclick="selectCategory('Law')">⚖️ Law</div>
          </div>
        </section>

        <section id="setup-section" class="setup-panel">
          <div id="domains"></div>

          <div class="setup-grid">
            <div class="control-group">
              <label id="difficult-label">Difficulty</label>
              <select id="level">
                <option value="easy">Easy</option>
                <option value="normal">Normal</option>
                <option value="hard">Hard</option>
              </select>
            </div>

            <div class="control-group">
              <label id="count-label">Number of Questions</label>
              <select id="count">
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="20">20</option>
              </select>
            </div>
          </div>

          <p id="quiz-access-note" class="access-note">Login or register to unlock the quiz</p>
          <button class="start-btn" id="start-btn" onclick="startQuiz()">Start Quiz</button>
        </section>

        <div id="quiz"></div>
    </div>

    <script src="script.js?v=2"></script>
    
</body>
</html>
